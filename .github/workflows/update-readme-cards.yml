name: Update README cards

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-readme-cards.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin — ScriptableObjectCollection
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=ScriptableObjectCollection&theme=dracula
          path: profile/pin-ScriptableObjectCollection.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin — Animation-Sequencer
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=Animation-Sequencer&theme=dracula
          path: profile/pin-Animation-Sequencer.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin — SpriteAuditor
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=SpriteAuditor&theme=dracula
          path: profile/pin-SpriteAuditor.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin — SceneKeeper
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=SceneKeeper&theme=dracula
          path: profile/pin-SceneKeeper.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin — ServiceLocator
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=ServiceLocator&theme=dracula
          path: profile/pin-ServiceLocator.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin — UIManager
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=UIManager&theme=dracula
          path: profile/pin-UIManager.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stat cards" || exit 0
          git push
